<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>837 Encounter Platform</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="container">
    <header>
      <h1>837 Encounter Platform</h1>
      <p>Deterministic 837 validation with advisory-only AI suggestions.</p>
    </header>

    <section class="panel">
      <h2>Input</h2>
      <textarea id="encounterInput" rows="7"></textarea>
      <div class="actions">
        <button id="loadSample" type="button">Load sample</button>
        <button id="validate" type="button" class="primary">Validate</button>
      </div>
    </section>

    <section class="panel two-col">
      <div>
        <h2>Validation findings</h2>
        <pre id="findingsOutput"></pre>
      </div>
      <div>
        <h2>AI advisory</h2>
        <pre id="advisoryOutput"></pre>
      </div>
    </section>
  </main>

  <script type="module" src="../src/main.js"></script>
</body>
</html>
